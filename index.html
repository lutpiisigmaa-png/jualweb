<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog | Roti Gembong</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-yellow: #fbbd18; /* Kuning Kota Raja */
            --primary-brown: #4e3415;  /* Coklat Roti */
            --bg-body: #e5e7eb;        /* Abu-abu luar layar */
            --white: #ffffff;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Poppins', sans-serif; 
        }
        
        body { 
            background-color: var(--bg-body); 
            display: flex; 
            justify-content: center; /* Memastikan app berada di tengah browser laptop */
        }

        /* CONTAINER UTAMA (Ukuran HP) */
        .app-container {
            width: 100%;
            max-width: 480px; 
            background-color: var(--primary-brown);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* HEADER KUNING (TEMPAT LOGO LU NANTI) */
        header {
            background-color: var(--primary-yellow);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Ini tempat lu masukin tag <img> logo aslinya nanti bray */
        .logo-placeholder {
            font-weight: 800;
            color: var(--white);
            -webkit-text-stroke: 1px var(--primary-brown); /* Efek outline ala logo di foto */
            font-size: 22px;
            display: flex;
            flex-direction: column;
            line-height: 1.1;
            letter-spacing: 1px;
        }
      .logo-placeholder span { 
            font-size: 10px; 
            font-weight: 700; 
            letter-spacing: 0px; 
            -webkit-text-stroke: 0px;
            color: var(--primary-brown);
        }

        .menu-icon { 
            color: var(--white); 
            font-size: 24px; 
            cursor: pointer; 
        }

        /* BAGIAN SEARCH BAR (AREA COKLAT) */
        .search-section {
            padding: 25px 20px;
            background-color: var(--primary-brown);
        }

        .search-box {
            background: var(--white);
            border-radius: 30px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .search-box i { color: #6b7280; font-size: 16px; }
        .search-box input {
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            font-weight: 500;
            color: #374151;
        }

        /* AREA KANVAS PUTIH (BAWAH) */
        .main-content {
            background-color: var(--white);
            border-radius: 35px 35px 0 0; /* Lengkungan atas */
            padding: 35px 25px;
            min-height: calc(100vh - 180px); /* Memenuhi sisa layar bawah */
        }

        /* GRID FOTO MENU (2 KOLOM) */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        /* KOTAK MENU DENGAN BORDER KUNING */
        .menu-card {
            background-color: #f0f8ff; /* Warna background sementara */
            border: 6px solid var(--primary-yellow);
            border-radius: 25px;
            aspect-ratio: 1 / 1; /* Biar kotaknya proporsional 1:1 */
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .menu-card:hover { transform: scale(1.03); }

        /* FOTO ROTI DARI CLOUDINARY NANTI MASUK SINI */
        .menu-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
     <header>
    <img src="logo-roti.png" alt="Logo Kota Raja" style="height: 50px; object-fit: contain;">

    <div class="menu-icon">
        <i class="fa-solid fa-bars" style="color: #4e3415;"></i>
    </div>
</header>
        <div class="search-section">
            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="cari varian">
            </div>
        </div>

        <div class="main-content">
            <div class="catalog-grid" id="catalog">
                
                <div class="menu-card">
                    <img src="https://images.unsplash.com/photo-1598373182133-52452f7691ef?w=500&q=80" alt="Roti Gembong Coklat">
                </div>
                
                <div class="menu-card">
                    <img src="https://images.unsplash.com/photo-1550617931-e17a7b70dce2?w=500&q=80" alt="Roti Gembong Keju">
                </div>
                
                <div class="menu-card">
                    <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?w=500&q=80" alt="Roti Gembong Original">
                </div>
                
                <div class="menu-card">
                    <img src="https://images.unsplash.com/photo-1573140247632-f8fd74997d5c?w=500&q=80" alt="Roti Gembong Srikaya">
                </div>

            </div>
        </div>

    </div>

</body>
</html>
